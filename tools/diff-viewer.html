<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Viewer — Comparer deux textes — DevToolkit</title>
<meta name="description" content="Comparez deux textes ou fichiers de configuration ligne par ligne. Affichage des différences en couleur, mode inline et côte à côte.">
<style>
  :root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252836;--border:#2e3150;--accent:#6366f1;--text:#e2e8f0;--text-dim:#94a3b8;--added:#065f46;--added-text:#6ee7b7;--added-border:#10b981;--removed:#7f1d1d;--removed-text:#fca5a5;--removed-border:#ef4444;--changed:#78350f;--changed-text:#fcd34d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;}
  nav a{color:var(--text-dim);text-decoration:none;font-size:14px;}
  .logo{font-weight:800;color:var(--accent);font-size:16px;}
  .container{max-width:1200px;margin:0 auto;padding:24px;}
  h1{font-size:1.6rem;font-weight:800;margin-bottom:8px;}
  .subtitle{color:var(--text-dim);font-size:14px;margin-bottom:20px;}
  .editor-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .panel-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-dim);display:flex;align-items:center;gap:8px;}
  .panel-header .count{margin-left:auto;font-size:12px;}
  textarea{width:100%;height:220px;background:transparent;border:none;outline:none;color:var(--text);font-family:'Fira Code','Consolas',monospace;font-size:12px;padding:12px;resize:vertical;line-height:1.6;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  button{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;transition:all 0.15s;}
  button:hover{background:var(--accent);border-color:var(--accent);}
  button.primary{background:var(--accent);border-color:var(--accent);font-weight:600;}
  .diff-view{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .diff-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-dim);display:flex;gap:16px;}
  .diff-legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend-add{color:var(--added-text);}
  .legend-rm{color:var(--removed-text);}
  .diff-lines{font-family:'Fira Code','Consolas',monospace;font-size:12px;line-height:1.6;}
  .diff-line{display:flex;padding:2px 0;}
  .diff-line .ln{min-width:40px;text-align:right;padding:0 8px;color:var(--text-dim);user-select:none;font-size:11px;}
  .diff-line .content{flex:1;padding:0 12px;white-space:pre-wrap;word-break:break-all;}
  .line-added{background:var(--added);}
  .line-added .content{color:var(--added-text);}
  .line-added .ln{background:rgba(16,185,129,0.2);}
  .line-removed{background:var(--removed);}
  .line-removed .content{color:var(--removed-text);}
  .line-removed .ln{background:rgba(239,68,68,0.2);}
  .line-context .content{color:var(--text-dim);}
  .stats-bar{padding:10px 14px;background:var(--surface2);border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);display:flex;gap:16px;}
  @media(max-width:600px){.editor-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">⚡ DevToolkit</a>
  <span style="color:var(--border)">›</span>
  <a href="#">Diff Viewer</a>
</nav>

<div class="container">
  <h1>↔️ Diff Viewer</h1>
  <p class="subtitle">Comparez deux textes ligne par ligne — idéal pour configs, JSON, code, logs.</p>

  <div class="editor-row">
    <div class="panel">
      <div class="panel-header">📄 Original (A) <span class="count" id="count-a"></span></div>
      <textarea id="text-a" placeholder="Texte original..." oninput="diff()"></textarea>
    </div>
    <div class="panel">
      <div class="panel-header">📄 Modifié (B) <span class="count" id="count-b"></span></div>
      <textarea id="text-b" placeholder="Texte modifié..." oninput="diff()"></textarea>
    </div>
  </div>

  <div class="toolbar">
    <button class="primary" onclick="diff()">↔️ Comparer</button>
    <button onclick="swap()">⇄ Inverser A/B</button>
    <button onclick="loadSample()">📄 Exemple</button>
    <button onclick="clearAll()">🗑 Vider</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);">
      <input type="checkbox" id="ignore-whitespace" onchange="diff()" style="accent-color:var(--accent)"> Ignorer espaces
    </label>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);">
      <input type="number" id="context-lines" value="3" min="0" max="10" style="width:50px;padding:4px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);outline:none;" onchange="diff()"> lignes de contexte
    </label>
  </div>

  <div class="diff-view" id="diff-view" style="display:none">
    <div class="diff-header">
      <span>Résultat</span>
      <div class="diff-legend">
        <span class="legend-add">+ Ajoutées</span> &nbsp;
        <span class="legend-rm">− Supprimées</span>
      </div>
    </div>
    <div class="diff-lines" id="diff-lines"></div>
    <div class="stats-bar" id="diff-stats"></div>
  </div>
</div>

<script>
// Simple LCS-based diff
function lcs(a, b) {
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) {
    if(a[i-1]===b[j-1]) dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  const result=[];
  let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){result.unshift({type:'eq',val:a[i-1]});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){result.unshift({type:'add',val:b[j-1]});j--;}
    else{result.unshift({type:'rm',val:a[i-1]});i--;}
  }
  return result;
}

function escape(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function diff() {
  let a = document.getElementById('text-a').value;
  let b = document.getElementById('text-b').value;
  const ignWs = document.getElementById('ignore-whitespace').checked;
  const ctx = +document.getElementById('context-lines').value;

  document.getElementById('count-a').textContent = a.split('\n').length + ' lignes';
  document.getElementById('count-b').textContent = b.split('\n').length + ' lignes';

  if (!a && !b) { document.getElementById('diff-view').style.display='none'; return; }

  let linesA = a.split('\n');
  let linesB = b.split('\n');

  if (ignWs) {
    linesA = linesA.map(l=>l.trim());
    linesB = linesB.map(l=>l.trim());
  }

  const ops = lcs(linesA, linesB);

  // Determine which lines to show (context)
  const show = new Set();
  ops.forEach((op,i) => {
    if (op.type !== 'eq') {
      for(let d=-ctx;d<=ctx;d++) { if(i+d>=0&&i+d<ops.length) show.add(i+d); }
    }
  });

  let html = '';
  let addedCount = 0, removedCount = 0;
  let lineA = 1, lineB = 1;
  let prevShown = true;

  ops.forEach((op,i) => {
    const shown = show.has(i);
    if (!shown && prevShown && i>0) html += '<div style="padding:4px 12px;color:var(--text-dim);font-size:11px;background:var(--surface2)">⋯</div>';
    prevShown = shown;
    if (!shown) {
      if (op.type==='eq') { lineA++; lineB++; }
      else if (op.type==='rm') lineA++;
      else lineB++;
      return;
    }
    if (op.type==='eq') {
      html+=`<div class="diff-line line-context"><span class="ln">${lineA}</span><span class="ln">${lineB}</span><span class="content">  ${escape(op.val)}</span></div>`;
      lineA++; lineB++;
    } else if (op.type==='rm') {
      html+=`<div class="diff-line line-removed"><span class="ln">${lineA}</span><span class="ln"></span><span class="content">− ${escape(op.val)}</span></div>`;
      lineA++; removedCount++;
    } else {
      html+=`<div class="diff-line line-added"><span class="ln"></span><span class="ln">${lineB}</span><span class="content">+ ${escape(op.val)}</span></div>`;
      lineB++; addedCount++;
    }
  });

  document.getElementById('diff-lines').innerHTML = html || '<div style="padding:16px;color:var(--success)">✅ Les deux textes sont identiques.</div>';
  document.getElementById('diff-stats').innerHTML = `
    <span style="color:var(--added-text)">+${addedCount} ligne${addedCount!==1?'s':''} ajoutée${addedCount!==1?'s':''}</span>
    <span style="color:var(--removed-text)">−${removedCount} ligne${removedCount!==1?'s':''} supprimée${removedCount!==1?'s':''}</span>
    <span>${linesA.length} → ${linesB.length} lignes</span>
  `;
  document.getElementById('diff-view').style.display = 'block';
}

function swap() {
  const a = document.getElementById('text-a').value;
  document.getElementById('text-a').value = document.getElementById('text-b').value;
  document.getElementById('text-b').value = a;
  diff();
}

function clearAll() {
  document.getElementById('text-a').value='';
  document.getElementById('text-b').value='';
  document.getElementById('diff-view').style.display='none';
  document.getElementById('count-a').textContent='';
  document.getElementById('count-b').textContent='';
}

function loadSample() {
  document.getElementById('text-a').value = `{
  "name": "mon-projet",
  "version": "1.0.0",
  "description": "Un super projet",
  "scripts": {
    "start": "node index.js",
    "test": "jest"
  },
  "dependencies": {
    "express": "^4.18.0",
    "lodash": "^4.17.21"
  }
}`;
  document.getElementById('text-b').value = `{
  "name": "mon-projet",
  "version": "2.0.0",
  "description": "Un super projet amélioré",
  "scripts": {
    "start": "node server.js",
    "dev": "nodemon server.js",
    "test": "vitest"
  },
  "dependencies": {
    "express": "^5.0.0",
    "fastify": "^4.0.0"
  }
}`;
  diff();
}
</script>
</body>
</html>
