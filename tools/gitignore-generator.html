<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.gitignore Generator — DevToolkit</title>
<meta name="description" content="Generate .gitignore files for any tech stack. Select your technologies and get the perfect gitignore instantly.">
<style>
  :root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252836;--border:#2e3150;--accent:#6366f1;--text:#e2e8f0;--dim:#94a3b8;--success:#10b981}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
  header a{color:var(--dim);text-decoration:none;font-size:14px}
  .logo{font-weight:800;font-size:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .container{max-width:1100px;margin:0 auto;padding:32px 24px}
  h1{font-size:1.8rem;font-weight:700;margin-bottom:8px}
  .subtitle{color:var(--dim);margin-bottom:24px}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:800px){.layout{grid-template-columns:1fr}}
  .left-panel{display:flex;flex-direction:column;gap:16px}
  .tech-section h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:10px;font-weight:700}
  .tech-grid{display:flex;flex-wrap:wrap;gap:6px}
  .tech-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;user-select:none}
  .tech-btn.selected{background:var(--accent);color:white;border-color:var(--accent)}
  .tech-btn:hover:not(.selected){border-color:var(--accent);color:var(--text)}
  .selected-tags{display:flex;flex-wrap:wrap;gap:6px;min-height:36px;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
  .tag{padding:4px 10px;background:var(--accent);color:white;border-radius:12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
  .tag span{cursor:pointer;opacity:.7;transition:opacity .2s}.tag span:hover{opacity:1}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
  .btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#4f46e5}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
  .right-panel label{display:block;font-size:13px;color:var(--dim);margin-bottom:8px;font-weight:600}
  textarea{width:100%;height:560px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:14px;font-family:'Fira Code',monospace;font-size:12px;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
  textarea:focus{border-color:var(--accent)}
  .status{margin-top:8px;font-size:13px;color:var(--success)}
</style>
</head>
<body>
<header>
  <a href="../index.html">← DevToolkit</a>
  <span class="logo">.gitignore Generator</span>
</header>
<div class="container">
  <h1>🚫 .gitignore Generator</h1>
  <p class="subtitle">Select your tech stack and get a perfect .gitignore file instantly.</p>
  
  <div class="layout">
    <div class="left-panel">
      
      <div>
        <div class="tech-section"><h3>Selected Technologies</h3></div>
        <div class="selected-tags" id="selected-tags">
          <span style="color:var(--dim);font-size:13px">Click technologies below to add them...</span>
        </div>
      </div>

      <div class="tech-section">
        <h3>Languages</h3>
        <div class="tech-grid" id="lang-grid"></div>
      </div>
      
      <div class="tech-section">
        <h3>Frameworks & Libraries</h3>
        <div class="tech-grid" id="framework-grid"></div>
      </div>
      
      <div class="tech-section">
        <h3>Tools & Environments</h3>
        <div class="tech-grid" id="tools-grid"></div>
      </div>
      
      <div class="tech-section">
        <h3>IDEs & Editors</h3>
        <div class="tech-grid" id="ide-grid"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="generateGitignore()">🔄 Generate</button>
        <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="downloadOutput()">⬇️ Download</button>
        <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
      </div>
    </div>
    
    <div class="right-panel">
      <label>Generated .gitignore</label>
      <textarea id="output" readonly placeholder="Select technologies above and click Generate..."></textarea>
      <div id="status" class="status"></div>
    </div>
  </div>
</div>

<script>

  ],
  frameworks: [
    'React', 'Next.js', 'Vue', 'Nuxt', 'Angular', 'Svelte', 'Express', 'NestJS',
    'Django', 'Flask', 'FastAPI', 'Rails', 'Laravel', 'Spring', 'Gatsby', 'Astro',
    'React Native', 'Flutter', 'Electron'
  ],
  tools: [
    'Docker', 'Terraform', 'Kubernetes', 'Vagrant', 'Linux', 'macOS', 'Windows',
    'Git', 'npm', 'yarn', 'pnpm', 'Webpack', 'Vite', 'Parcel', 'Gradle', 'Maven',
    'Ansible', 'AWS', 'Vercel', 'Heroku'

const selected = new Set();

function initButtons() {
  const mapping = {
    'lang-grid': TECH.languages,
    'framework-grid': TECH.frameworks,
    'tools-grid': TECH.tools,
    'ide-grid': TECH.ides
  };
  for (const [gridId, items] of Object.entries(mapping)) {
    const grid = document.getElementById(gridId);
    items.forEach(tech => {
      const btn = document.createElement('button');
      btn.className = 'tech-btn';
      btn.textContent = tech;
      btn.onclick = () => toggleTech(tech, btn);
      grid.appendChild(btn);
    });
  }
}

function toggleTech(tech, btn) {
  if (selected.has(tech)) {
    selected.delete(tech);
    btn.classList.remove('selected');
  } else {
    selected.add(tech);
    btn.classList.add('selected');
  }
  renderTags();
  generateGitignore();
}

function renderTags() {
  const container = document.getElementById('selected-tags');
  if (selected.size === 0) {
    container.innerHTML = '<span style="color:var(--dim);font-size:13px">Click technologies below to add them...</span>';
    return;
  }
  container.innerHTML = Array.from(selected).map(t =>
    `<span class="tag">${t} <span onclick="removeTech('${t}')">✕</span></span>`
  ).join('');
}

function removeTech(tech) {
  selected.delete(tech);
  document.querySelectorAll('.tech-btn').forEach(btn => {
    if (btn.textContent === tech) btn.classList.remove('selected');
  });
  renderTags();
  generateGitignore();
}

function generateGitignore() {
  if (selected.size === 0) {
    document.getElementById('output').value = '';
    return;
  }
  
  const seen = new Set();
  let output = `# Generated by DevToolkit gitignore generator\n# https://lucasmdevdev.github.io/devtoolkit/\n\n`;
  
  // Always add defaults
  output += PATTERNS['default'];
  
  for (const tech of selected) {
    const pattern = PATTERNS[tech];
    if (pattern && !seen.has(tech)) {
      seen.add(tech);
      output += '\n' + pattern;
    }
  }
  
  document.getElementById('output').value = output.trim();
  document.getElementById('status').textContent = `✅ Generated for: ${Array.from(selected).join(', ')}`;
}

function copyOutput() {
  const out = document.getElementById('output').value;
  if (!out) return;
  navigator.clipboard.writeText(out).then(() => {
    document.getElementById('status').textContent = '✅ Copied to clipboard!';
  });
}

function downloadOutput() {
  const out = document.getElementById('output').value;
  if (!out) return;
  const blob = new Blob([out], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '.gitignore';
  a.click();
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.tech-btn').forEach(btn => btn.classList.remove('selected'));
  renderTags();
  document.getElementById('output').value = '';
  document.getElementById('status').textContent = '';
}

initButtons();
</script>
