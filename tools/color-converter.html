<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Converter HEX RGB HSL — DevToolkit</title>
<meta name="description" content="Convertissez les couleurs entre HEX, RGB, HSL, HSB/HSV en ligne. Aperçu en temps réel, copie en un clic, palette de couleurs.">
<style>
  :root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252836;--border:#2e3150;--accent:#6366f1;--text:#e2e8f0;--text-dim:#94a3b8;--success:#10b981;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;}
  nav a{color:var(--text-dim);text-decoration:none;font-size:14px;}
  .logo{font-weight:800;color:var(--accent);font-size:16px;}
  .container{max-width:800px;margin:0 auto;padding:32px 24px;}
  h1{font-size:1.6rem;font-weight:800;margin-bottom:8px;}
  .subtitle{color:var(--text-dim);font-size:14px;margin-bottom:28px;}
  .color-preview{width:100%;height:160px;border-radius:12px;margin-bottom:24px;transition:background 0.2s;position:relative;overflow:hidden;}
  .color-preview-text{position:absolute;bottom:12px;left:16px;font-family:'Fira Code',monospace;font-size:14px;opacity:0.8;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;}
  .panel h3{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text-dim);}
  .format-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
  .format-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;}
  .format-item label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px;}
  .format-item input{width:100%;background:transparent;border:none;outline:none;color:var(--accent);font-family:'Fira Code',monospace;font-size:15px;font-weight:600;}
  .format-item .copy-btn{float:right;padding:2px 8px;font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text-dim);transition:all 0.15s;}
  .format-item .copy-btn:hover{background:var(--accent);border-color:var(--accent);color:white;}
  .color-picker-row{display:flex;gap:16px;align-items:center;margin-bottom:16px;}
  input[type=color]{width:60px;height:50px;border:none;border-radius:8px;cursor:pointer;background:none;padding:0;}
  .color-input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Fira Code',monospace;font-size:15px;outline:none;}
  .color-input:focus{border-color:var(--accent);}
  .palette-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .swatch{width:40px;height:40px;border-radius:8px;cursor:pointer;transition:transform 0.15s;border:1px solid rgba(255,255,255,0.1);}
  .swatch:hover{transform:scale(1.15);}
  .sliders{display:flex;flex-direction:column;gap:12px;}
  .slider-row{display:flex;align-items:center;gap:12px;}
  .slider-row label{width:80px;font-size:13px;color:var(--text-dim);}
  .slider-row input[type=range]{flex:1;accent-color:var(--accent);}
  .slider-row .val{width:40px;text-align:right;font-family:'Fira Code',monospace;font-size:13px;color:var(--accent);}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">⚡ DevToolkit</a>
  <span style="color:var(--border)">›</span>
  <a href="#">Color Converter</a>
</nav>

<div class="container">
  <h1>🎨 Color Converter</h1>
  <p class="subtitle">Convertissez entre HEX, RGB, HSL, HSB. Aperçu en temps réel. Cliquez sur une valeur pour la copier.</p>

  <div class="color-preview" id="preview">
    <div class="color-preview-text" id="preview-text"></div>
  </div>

  <div class="panel">
    <div class="color-picker-row">
      <input type="color" id="color-picker" value="#6366f1" oninput="fromPicker()">
      <input type="text" class="color-input" id="hex-quick" value="#6366f1" placeholder="#6366f1 ou rgb(99,102,241)" oninput="fromText(this.value)">
    </div>

    <div class="format-grid" id="format-grid"></div>
  </div>

  <div class="panel">
    <h3>Sliders RGB</h3>
    <div class="sliders">
      <div class="slider-row"><label>Rouge</label><input type="range" id="r" min="0" max="255" value="99" oninput="fromRGB()"><span class="val" id="r-val">99</span></div>
      <div class="slider-row"><label>Vert</label><input type="range" id="g" min="0" max="255" value="102" oninput="fromRGB()"><span class="val" id="g-val">102</span></div>
      <div class="slider-row"><label>Bleu</label><input type="range" id="b" min="0" max="255" value="241" oninput="fromRGB()"><span class="val" id="b-val">241</span></div>
    </div>
  </div>

  <div class="panel">
    <h3>Palette de couleurs</h3>
    <div class="palette-grid" id="palette"></div>
  </div>
</div>

<script>
const PALETTE = ['#ef4444','#f97316','#f59e0b','#84cc16','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#ffffff','#94a3b8','#475569','#1e293b','#0f172a','#000000'];

function hexToRgb(hex) {
  hex = hex.replace(/^#/, '');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex, 16);
  return {r:(n>>16)&255, g:(n>>8)&255, b:n&255};
}

function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(n=>(Math.round(n)&255).toString(16).padStart(2,'0')).join('');
}

function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h, s, l=(max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return {h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100)};
}

function rgbToHsb(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h,s,v=max;
  s = max===0 ? 0 : d/max;
  if (d===0) h=0;
  else {
    switch(max) {
      case r: h=((g-b)/d)%6; break;
      case g: h=(b-r)/d+2; break;
      case b: h=(r-g)/d+4; break;
    }
    h=Math.round(h*60); if(h<0) h+=360;
  }
  return {h, s:Math.round(s*100), b:Math.round(v*100)};
}

function luma(r,g,b) { return 0.299*r + 0.587*g + 0.114*b; }

function update(r,g,b) {
  r=Math.max(0,Math.min(255,Math.round(r)));
  g=Math.max(0,Math.min(255,Math.round(g)));
  b=Math.max(0,Math.min(255,Math.round(b)));

  const hex = rgbToHex(r,g,b);
  const hsl = rgbToHsl(r,g,b);
  const hsb = rgbToHsb(r,g,b);
  const textColor = luma(r,g,b) > 128 ? '#000000' : '#ffffff';

  document.getElementById('preview').style.background = hex;
  document.getElementById('preview-text').style.color = textColor;
  document.getElementById('preview-text').textContent = hex + ' · rgb('+r+','+g+','+b+')';
  document.getElementById('color-picker').value = hex;
  document.getElementById('hex-quick').value = hex;

  // Sliders
  document.getElementById('r').value = r; document.getElementById('r-val').textContent = r;
  document.getElementById('g').value = g; document.getElementById('g-val').textContent = g;
  document.getElementById('b').value = b; document.getElementById('b-val').textContent = b;

  const formats = [
    ['HEX', hex],
    ['RGB', `rgb(${r}, ${g}, ${b})`],
    ['RGBA', `rgba(${r}, ${g}, ${b}, 1)`],
    ['HSL', `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`],
    ['HSB/HSV', `hsb(${hsb.h}, ${hsb.s}%, ${hsb.b}%)`],
    ['CSS var', `--color: ${hex};`],
    ['Tailwind-like', `[${hex}]`],
    ['RGB %', `rgb(${(r/255*100).toFixed(1)}%, ${(g/255*100).toFixed(1)}%, ${(b/255*100).toFixed(1)}%)`],
  ];

  document.getElementById('format-grid').innerHTML = formats.map(([label, val]) => `
    <div class="format-item">
      <label>${label} <button class="copy-btn" onclick="copy('${val}',this)">copier</button></label>
      <input value="${val}" readonly onclick="copy('${val}',null)">
    </div>
  `).join('');
}

function copy(val, btn) {
  navigator.clipboard.writeText(val);
  if (btn) { btn.textContent='✓'; setTimeout(()=>btn.textContent='copier',1200); }
}

function fromPicker() {
  const hex = document.getElementById('color-picker').value;
  const {r,g,b} = hexToRgb(hex);
  update(r,g,b);
}

function fromRGB() {
  const r=+document.getElementById('r').value;
  const g=+document.getElementById('g').value;
  const b=+document.getElementById('b').value;
  document.getElementById('r-val').textContent=r;
  document.getElementById('g-val').textContent=g;
  document.getElementById('b-val').textContent=b;
  update(r,g,b);
}

function fromText(val) {
  val = val.trim();
  // HEX
  if (/^#?[0-9a-fA-F]{3,8}$/.test(val.replace(/^#/,''))) {
    const hex = val.startsWith('#') ? val : '#'+val;
    if (hex.replace('#','').length >= 3) {
      const {r,g,b}=hexToRgb(hex); update(r,g,b); return;
    }
  }
  // rgb(r,g,b)
  const rgb = val.match(/rgba?\((\d+)[,\s]+(\d+)[,\s]+(\d+)/);
  if (rgb) { update(+rgb[1],+rgb[2],+rgb[3]); return; }
}

// Init palette
document.getElementById('palette').innerHTML = PALETTE.map(c =>
  `<div class="swatch" style="background:${c}" title="${c}" onclick="fromText('${c}')"></div>`
).join('');

// Init
const init = hexToRgb('#6366f1');
update(init.r, init.g, init.b);
</script>
</body>
</html>
