<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Shadow Generator — DevToolkit</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252836;--border:#2e3150;--accent:#6366f1;--accent2:#8b5cf6;--text:#e2e8f0;--text-dim:#94a3b8;--success:#10b981}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
  .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  .back{color:var(--text-dim);text-decoration:none;font-size:14px}
  .container{max-width:1000px;margin:0 auto;padding:32px 24px}
  h1{font-size:1.8rem;font-weight:700;margin-bottom:8px}
  .subtitle{color:var(--text-dim);margin-bottom:28px}
  .layout{display:grid;grid-template-columns:320px 1fr;gap:24px}
  .controls{display:flex;flex-direction:column;gap:16px}
  .ctrl{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
  .ctrl label{font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;margin-bottom:8px}
  .ctrl label span{color:var(--text);font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent)}
  input[type=color]{width:100%;height:36px;border:1px solid var(--border);background:var(--surface2);border-radius:6px;cursor:pointer;padding:2px}
  .checkbox-row{display:flex;align-items:center;gap:8px}
  .checkbox-row input{accent-color:var(--accent);width:16px;height:16px}
  .preview-area{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;padding:40px;min-height:300px}
  .preview-box{width:160px;height:160px;background:#6366f1;border-radius:12px;transition:box-shadow .2s}
  .output{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
  .output h3{font-size:13px;color:var(--text-dim);margin-bottom:10px}
  .code{background:var(--surface2);padding:12px;border-radius:6px;font-family:monospace;font-size:14px;color:var(--accent);word-break:break-all}
  .copy-btn{margin-top:10px;background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;width:100%}
  .presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .preset{background:var(--surface2);border:1px solid var(--border);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text)}
  .preset:hover{border-color:var(--accent)}
  @media(max-width:700px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="logo">⚡ DevToolkit</a>
  <a href="../index.html" class="back">← All tools</a>
</header>
<div class="container">
  <h1>🌑 CSS Box Shadow Generator</h1>
  <p class="subtitle">Visually generate CSS box-shadow values with live preview.</p>
  <div class="layout">
    <div class="controls">
      <div class="ctrl">
        <label>Offset X <span id="oxv">0px</span></label>
        <input type="range" id="ox" min="-100" max="100" value="0" oninput="update()">
      </div>
      <div class="ctrl">
        <label>Offset Y <span id="oyv">8px</span></label>
        <input type="range" id="oy" min="-100" max="100" value="8" oninput="update()">
      </div>
      <div class="ctrl">
        <label>Blur <span id="blv">20px</span></label>
        <input type="range" id="bl" min="0" max="100" value="20" oninput="update()">
      </div>
      <div class="ctrl">
        <label>Spread <span id="spv">0px</span></label>
        <input type="range" id="sp" min="-50" max="50" value="0" oninput="update()">
      </div>
      <div class="ctrl">
        <label>Opacity <span id="opv">40%</span></label>
        <input type="range" id="op" min="0" max="100" value="40" oninput="update()">
      </div>
      <div class="ctrl">
        <label>Color</label>
        <input type="color" id="col" value="#000000" oninput="update()">
      </div>
      <div class="ctrl">
        <div class="checkbox-row">
          <input type="checkbox" id="inset" onchange="update()">
          <label style="margin:0">Inset shadow</label>
        </div>
      </div>
    </div>
    <div>
      <div class="preview-area" id="previewArea">
        <div class="preview-box" id="previewBox"></div>
      </div>
      <div class="output">
        <h3>CSS Output</h3>
        <div class="code" id="code">box-shadow: 0px 8px 20px 0px rgba(0,0,0,0.4);</div>
        <button class="copy-btn" onclick="copyShadow()">Copy CSS</button>
      </div>
      <div class="presets">
        <span style="font-size:12px;color:var(--text-dim);align-self:center">Presets:</span>
        <div class="preset" onclick="applyPreset('0 1px 3px 0 rgba(0,0,0,0.1),0 1px 2px 0 rgba(0,0,0,0.06)')">Small</div>
        <div class="preset" onclick="applyPreset('0 4px 6px -1px rgba(0,0,0,0.1)')">Medium</div>
        <div class="preset" onclick="applyPreset('0 20px 25px -5px rgba(0,0,0,0.1)')">Large</div>
        <div class="preset" onclick="applyPreset('0 25px 50px -12px rgba(0,0,0,0.25)')">XL</div>
        <div class="preset" onclick="applyPreset('0 0 15px rgba(99,102,241,0.7)')">Glow</div>
        <div class="preset" onclick="applyPreset('inset 0 2px 4px 0 rgba(0,0,0,0.06)')">Inset</div>
      </div>
    </div>
  </div>
</div>
<script>
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function update(){
  const ox=document.getElementById('ox').value, oy=document.getElementById('oy').value;
  const bl=document.getElementById('bl').value, sp=document.getElementById('sp').value;
  const op=document.getElementById('op').value/100;
  const col=document.getElementById('col').value;
  const inset=document.getElementById('inset').checked;
  const {r,g,b}=hexToRgb(col);

  document.getElementById('oxv').textContent=ox+'px';
  document.getElementById('oyv').textContent=oy+'px';
  document.getElementById('blv').textContent=bl+'px';
  document.getElementById('spv').textContent=sp+'px';
  document.getElementById('opv').textContent=Math.round(op*100)+'%';

  const shadow=`${inset?'inset ':''}${ox}px ${oy}px ${bl}px ${sp}px rgba(${r},${g},${b},${op.toFixed(2)})`;
  document.getElementById('previewBox').style.boxShadow=shadow;
  document.getElementById('code').textContent=`box-shadow: ${shadow};`;
}

function copyShadow(){
  navigator.clipboard.writeText(document.getElementById('code').textContent);
  const btn=document.querySelector('.copy-btn');
  btn.textContent='Copied!';
  btn.style.background='#10b981';
  setTimeout(()=>{btn.textContent='Copy CSS';btn.style.background='';},1500);
}

function applyPreset(value){
  document.getElementById('previewBox').style.boxShadow=value;
  document.getElementById('code').textContent=`box-shadow: ${value};`;
}

update();
</script>
</body>
</html>
