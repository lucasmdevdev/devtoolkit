<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PX to REM Converter — DevToolkit</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252836;--border:#2e3150;--accent:#6366f1;--accent2:#8b5cf6;--text:#e2e8f0;--text-dim:#94a3b8;--success:#10b981}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
  .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  .back{color:var(--text-dim);text-decoration:none;font-size:14px}
  .container{max-width:800px;margin:0 auto;padding:32px 24px}
  h1{font-size:1.8rem;font-weight:700;margin-bottom:8px}
  .subtitle{color:var(--text-dim);margin-bottom:28px}
  .converter{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:24px}
  .field label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px}
  .field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:8px;font-size:1.8rem;font-weight:600;outline:none;text-align:center}
  .field input:focus{border-color:var(--accent)}
  .arrow{color:var(--accent);font-size:1.5rem;text-align:center}
  .base-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:24px}
  .base-row label{font-size:13px;color:var(--text-dim)}
  .base-row input{background:transparent;border:none;color:var(--accent);font-size:16px;font-weight:600;width:60px;outline:none}
  .table-section h3{font-size:1rem;color:var(--text-dim);margin-bottom:12px;font-weight:600}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:10px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);border-bottom:1px solid var(--border)}
  td{padding:10px 14px;font-size:14px;border-bottom:1px solid var(--border);font-family:monospace}
  tr:hover td{background:var(--surface2)}
  .copy-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer}
  .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="logo">⚡ DevToolkit</a>
  <a href="../index.html" class="back">← All tools</a>
</header>
<div class="container">
  <h1>📐 PX ↔ REM Converter</h1>
  <p class="subtitle">Convert between pixels and rem units. Essential for responsive CSS design.</p>

  <div class="base-row">
    <label>Base font size (html):</label>
    <input type="number" id="base" value="16" min="1" max="32" oninput="convert()"> px
  </div>

  <div class="converter">
    <div class="field">
      <label>Pixels (px)</label>
      <input type="number" id="px" value="16" oninput="fromPx()">
    </div>
    <div class="arrow">⇄</div>
    <div class="field">
      <label>Root EM (rem)</label>
      <input type="number" id="rem" value="1" step="0.001" oninput="fromRem()">
    </div>
  </div>

  <div class="table-section">
    <h3>Common conversion table</h3>
    <table>
      <thead><tr><th>PX</th><th>REM (base 16)</th><th>REM (your base)</th><th></th></tr></thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>
<script>
const common = [8,10,12,14,16,18,20,24,28,32,36,40,48,56,64,72,80,96,112,128];

function getBase(){ return parseFloat(document.getElementById('base').value)||16; }

function fromPx(){
  const px = parseFloat(document.getElementById('px').value)||0;
  document.getElementById('rem').value = (px/getBase()).toFixed(4);
  updateTable();
}
function fromRem(){
  const rem = parseFloat(document.getElementById('rem').value)||0;
  document.getElementById('px').value = (rem*getBase()).toFixed(2);
  updateTable();
}
function convert(){
  fromPx();
}

function updateTable(){
  const base = getBase();
  document.getElementById('table').innerHTML = common.map(px=>`
    <tr>
      <td>${px}px</td>
      <td>${(px/16).toFixed(4)}rem</td>
      <td>${(px/base).toFixed(4)}rem</td>
      <td><button class="copy-btn" onclick="copyText('${(px/base).toFixed(4)}rem')">Copy</button></td>
    </tr>
  `).join('');
}

function copyText(t){
  navigator.clipboard.writeText(t);
}

updateTable();
</script>
</body>
</html>
