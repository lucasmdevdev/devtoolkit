<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — DevToolkit</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252836;--border:#2e3150;--accent:#6366f1;--accent2:#8b5cf6;--text:#e2e8f0;--text-dim:#94a3b8;--success:#10b981}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
  .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  .back{color:var(--text-dim);text-decoration:none;font-size:14px}
  .container{max-width:900px;margin:0 auto;padding:32px 24px}
  h1{font-size:1.8rem;font-weight:700;margin-bottom:8px}
  .subtitle{color:var(--text-dim);margin-bottom:28px}
  textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:8px;font-size:15px;line-height:1.7;resize:vertical;min-height:220px;outline:none}
  textarea:focus{border-color:var(--accent)}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:20px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
  .stat-value{font-size:2rem;font-weight:700;color:var(--accent)}
  .stat-label{font-size:12px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
  .extras{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
  .extras h3{font-size:14px;color:var(--text-dim);margin-bottom:12px}
  .freq-item{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="logo">⚡ DevToolkit</a>
  <a href="../index.html" class="back">← All tools</a>
</header>
<div class="container">
  <h1>📊 Word & Character Counter</h1>
  <p class="subtitle">Count words, characters, sentences, paragraphs, and estimate reading time.</p>
  <textarea id="input" oninput="analyze()" placeholder="Paste or type your text here...">The quick brown fox jumps over the lazy dog. This sentence is a classic pangram used in typography and design. It contains every letter of the English alphabet at least once.</textarea>
  <div class="stats" id="stats"></div>
  <div class="extras">
    <h3>Most frequent words</h3>
    <div id="freq"></div>
  </div>
</div>
<script>
function analyze() {
  const text = document.getElementById('input').value;
  const words = text.trim() ? text.trim().split(/\s+/).filter(w=>w.length>0) : [];
  const chars = text.length;
  const charsNoSpaces = text.replace(/\s/g,'').length;
  const sentences = text.split(/[.!?]+/).filter(s=>s.trim().length>0).length;
  const paragraphs = text.split(/\n\n+/).filter(p=>p.trim().length>0).length || (text.trim() ? 1 : 0);
  const readingTime = Math.max(1, Math.ceil(words.length / 200));
  const speakingTime = Math.max(1, Math.ceil(words.length / 130));
  const avgWordLen = words.length ? (words.join('').length / words.length).toFixed(1) : 0;
  const uniqueWords = new Set(words.map(w=>w.toLowerCase().replace(/[^a-z]/g,''))).size;

  document.getElementById('stats').innerHTML = [
    ['Words', words.length],
    ['Characters', chars],
    ['Chars (no spaces)', charsNoSpaces],
    ['Sentences', sentences],
    ['Paragraphs', paragraphs],
    ['Unique words', uniqueWords],
    [`${readingTime} min read`, '(200 wpm)'],
    [`${speakingTime} min speak`, '(130 wpm)'],
  ].map(([v,l])=>`<div class="stat"><div class="stat-value">${v}</div><div class="stat-label">${l}</div></div>`).join('');

  // Word frequency
  const freq = {};
  words.forEach(w => {
    const clean = w.toLowerCase().replace(/[^a-z]/g,'');
    if (clean.length > 2) freq[clean] = (freq[clean]||0)+1;
  });
  const top = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('freq').innerHTML = top.length
    ? top.map(([w,c])=>`<div class="freq-item"><span>${w}</span><span>${c}x</span></div>`).join('')
    : '<div style="color:var(--text-dim);font-size:13px">Start typing to see word frequency...</div>';
}
analyze();
</script>
</body>
</html>
